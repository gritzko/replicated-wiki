name: Deploy static wiki to Pages

# The site is pre-built locally with `make` (the `mark` renderer is not available
# on the runners) and lives in the html/ submodule (repo gritzko/replicated.live).
# This workflow checks out that submodule and publishes it at replicated.wiki —
# stamping THIS repo's CNAME over the submodule's own (replicated.live).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # pull the html/ submodule (public repo)
      - uses: actions/configure-pages@v5
      # html/ ships replicated.live's CNAME; stamp this repo's domain so the
      # artifact serves at replicated.wiki instead.
      - run: cp CNAME html/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: html
      - id: deployment
        uses: actions/deploy-pages@v4
