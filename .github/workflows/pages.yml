name: Deploy static wiki to Pages

# The site is pre-built locally with `make` (the `mark` renderer is not available
# on the runners) and the html/ tree is committed. This workflow just publishes it.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: html
      - id: deployment
        uses: actions/deploy-pages@v4
